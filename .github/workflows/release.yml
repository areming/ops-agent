name: release

# Build the Linux agent binaries and publish them on the GitHub release when a
# version tag is pushed. `ops connect <new-host>` fetches these to self-install.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build static binaries
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X github.com/areming/ops-agent/internal/version.Value=${VERSION}"
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="${arch}" go build -trimpath -ldflags "${LDFLAGS}" \
              -o "dist/ops-linux-${arch}" ./cmd/ops
          done

      - name: Checksums
        working-directory: dist
        run: sha256sum ops-linux-amd64 ops-linux-arm64 > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/ops-linux-amd64 dist/ops-linux-arm64 dist/SHA256SUMS \
            --title "${GITHUB_REF_NAME}" --generate-notes
